<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
<style>
body { font-family:sans-serif; background:#f8f8f8; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:40px;}
.card { background:white; padding:15px; border-radius:10px;}
.card img { width:100%; }
</style>
</head>
<body>

<h1 style="text-align:center;">Shop All</h1>

<div class="grid">

<div class="card">
<img src="https://source.unsplash.com/300x300/?streetwear">
<h3>Street Hoodie</h3>
<p>₹1,299</p>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x300/?fashion-shirt">
<h3>Printed Shirt</h3>
<p>₹899</p>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x300/?denim">
<h3>Denim Jacket</h3>
<p>₹2,499</p>
</div>

</div>

</body>
</html>
