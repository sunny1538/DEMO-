<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENZWEAR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body { background:#fff; color:#111; }

/* NAVBAR */
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    border-bottom:1px solid #eee;
}
nav h2 { font-weight:600; letter-spacing:2px; }
nav a {
    text-decoration:none;
    color:#111;
    margin-left:25px;
    font-size:14px;
}
nav a:hover { opacity:0.6; }

/* HERO SLIDER */
.hero {
    position:relative;
    height:90vh;
    overflow:hidden;
}
.slide {
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    transition:1s;
}
.overlay {
    position:absolute;
    top:50%;
    left:10%;
    transform:translateY(-50%);
    color:white;
}
.overlay h1 {
    font-size:50px;
}
.overlay button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:black;
    color:white;
}

/* PRODUCTS */
.section { padding:60px; }
.section h2 { margin-bottom:30px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card {
    cursor:pointer;
}
.card img {
    width:100%;
    transition:0.4s;
}
.card:hover img {
    transform:scale(1.05);
}
.card h3 { font-size:16px; margin-top:10px; }
.price { color:#555; }

/* FOOTER */
footer {
    padding:40px;
    text-align:center;
    border-top:1px solid #eee;
    margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){
    nav { padding:20px; }
    .overlay h1 { font-size:30px; }
}
</style>
</head>

<body>

<nav>
<h2>GENZWEAR</h2>
<div>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520975922284-9e0ce8274b43');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1503342217505-b0a15ec3261c');"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');"></div>
</div>

<div class="overlay">
<h1>NEW SEASON DROP</h1>
<button onclick="location.href='shop.html'">Shop Now</button>
</div>
</div>

<!-- PRODUCTS -->
<section class="section">
<h2>Trending</h2>
<div class="card">
<img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=400">
<h3>Minimal White Tee</h3>
<p class="price">₹899</p>
</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=400">
    <h3>Minimal Tee</h3>
    <p class="price">₹899</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1544441893-675973e31985?w=400">
    <h3>Oversized Hoodie</h3>
    <p class="price">₹1,499</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1503341733017-1901578f9f1e?w=400">
    <h3>Baggy Jeans</h3>
    <p class="price">₹1,999</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a5f?w=400">
    <h3>Street Jacket</h3>
    <p class="price">₹2,499</p>
  </div>

</div>
